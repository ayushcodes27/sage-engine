<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAGE Engine | Live Feed</title>
    <script src="/socket.io/socket.io.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 20px; }
        .metrics { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background: #1e1e1e; padding: 20px; border-radius: 8px; flex: 1; text-align: center; border: 1px solid #333; }
        .card h2 { margin: 0; font-size: 2rem; }
        .allowed { color: #4caf50; }
        .blocked { color: #f44336; }
        .chart-container { background: #1e1e1e; padding: 20px; border-radius: 8px; border: 1px solid #333; height: 500px; }
    </style>
</head>
<body>

<h1>SAGE Engine Telemetry</h1>

<div class="metrics">
    <div class="card"><h3 class="allowed">Allowed Traffic</h3><h2 id="allowed-count">0</h2></div>
    <div class="card"><h3 class="blocked">Mitigated Attacks</h3><h2 id="blocked-count">0</h2></div>
</div>

<div class="chart-container">
    <canvas id="trafficChart"></canvas>
</div>

<script>
    const socket = io();
    let allowedTotal = 0;
    let blockedTotal = 0;

    // Initialize Chart.js
    const ctx = document.getElementById('trafficChart').getContext('2d');
    const trafficChart = new Chart(ctx, {
        type: 'line',
        data: {
            labels: [], // Time stamps
            datasets: [
                { label: 'Allowed', borderColor: '#4caf50', backgroundColor: 'rgba(76, 175, 80, 0.2)', data: [], fill: true, tension: 0.4 },
                { label: 'Blocked', borderColor: '#f44336', backgroundColor: 'rgba(244, 67, 54, 0.2)', data: [], fill: true, tension: 0.4 }
            ]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            animation: false,
            scales: {
                x: { display: false }, // Hide x-a  xis to look like a continuous monitor
                y: { beginAtZero: true }
            }
        }
    });

    // Current second buckets
    let currentSecond = Math.floor(Date.now() / 1000);
    let allowedThisSecond = 0;
    let blockedThisSecond = 0;

    // Listen for Kafka Events from the Node Server
    socket.on('sage-telemetry', (event) => {
        // Update Totals
        if (event.mlMetadata && (event.mlMetadata.isBotFlag === 1 || event.mlMetadata.isBotFlag === true)) {
            blockedTotal++;
            blockedThisSecond++;
            document.getElementById('blocked-count').innerText = blockedTotal;
        } else {
            allowedTotal++;
            allowedThisSecond++;
            document.getElementById('allowed-count').innerText = allowedTotal;
        }
    });

    // Tick the chart every 1 second
    setInterval(() => {
        const timeLabel = new Date().toLocaleTimeString();

        trafficChart.data.labels.push(timeLabel);
        trafficChart.data.datasets[0].data.push(allowedThisSecond);
        trafficChart.data.datasets[1].data.push(blockedThisSecond);

        // Keep only the last 60 seconds on the graph
        if (trafficChart.data.labels.length > 60) {
            trafficChart.data.labels.shift();
            trafficChart.data.datasets[0].data.shift();
            trafficChart.data.datasets[1].data.shift();
        }

        trafficChart.update();

        // Reset buckets for the next second
        allowedThisSecond = 0;
        blockedThisSecond = 0;
    }, 1000);
</script>
</body>
</html>
